name: Deploy exampleSite to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          HUGO_VERSION=$(curl -sL "https://api.github.com/repos/gohugoio/hugo/releases/latest" \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q -O /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo

      - name: Build exampleSite
        run: |
          hugo \
            --source exampleSite \
            --themesDir ../.. \
            --baseURL "https://jackhickey.github.io/hugo-moo-theme/" \
            --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exampleSite/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
