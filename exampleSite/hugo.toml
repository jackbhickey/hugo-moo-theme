baseURL = "https://jackhickey.github.io/hugo-moo-theme/"
languageCode = "en"
title = "Tome"
theme = "hugo-moo-theme"

[params]
  subtitle = "theme docs"
  description = "A warm, book-inspired documentation theme for Hugo"
  repoUrl = "https://github.com/jackhickey/hugo-moo-theme"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
