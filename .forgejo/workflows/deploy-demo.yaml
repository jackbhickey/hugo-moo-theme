name: Deploy demo site

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          HUGO_VERSION=$(curl -sL "https://api.github.com/repos/gohugoio/hugo/releases/latest" \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q -O /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo
          hugo version

      - name: Build exampleSite
        run: |
          hugo \
            --source exampleSite \
            --themesDir ../.. \
            --baseURL "https://hugo-moo-theme.moo.media/" \
            --destination ${{ github.workspace }}/public \
            --minify \
            --environment production

      - name: Install rsync + openssh
        run: apt-get update && apt-get install -y rsync openssh-client

      - name: Deploy
        env:
          DEPLOY_KEY: ${{ secrets.KIZUNA_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.HUGO_MOO_THEME_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.HUGO_MOO_THEME_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.HUGO_MOO_THEME_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ${{ github.workspace }}/public/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
