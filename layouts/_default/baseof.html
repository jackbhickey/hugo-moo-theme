<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div class="sidebar-layout">
    {{ partial "nav.html" . }}
    <main class="content">
      <div class="page-surface" id="main-content">
        {{ partial "breadcrumb.html" . }}
        {{ block "main" . }}{{ end }}
        {{ partial "footer.html" . }}
      </div>
    </main>
  </div><!-- /.sidebar-layout -->
</body>
</html>
