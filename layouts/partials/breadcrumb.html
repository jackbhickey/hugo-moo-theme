{{ if not .IsHome }}
<nav class="breadcrumb" aria-label="Breadcrumb">
  <ol>
    <li><a href="{{ "/" | relURL }}">Docs</a></li>
    {{ if .Parent }}
      {{ if not .Parent.IsHome }}
        <li><a href="{{ .Parent.Permalink }}">{{ .Parent.Title }}</a></li>
      {{ end }}
    {{ end }}
    <li aria-current="page">{{ .Title }}</li>
  </ol>
</nav>
{{ end }}
