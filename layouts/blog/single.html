{{ define "main" }}
<article class="prose">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ with .Date }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "2 January 2006" }}</time>{{ end }}
      {{ with .Params.author }}<span class="post-author">{{ . }}</span>{{ end }}
    </div>
  </header>
  {{ .Content }}
</article>
{{ end }}
