{{ define "main" }}
<article class="prose">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  {{ if .RegularPages }}
  <nav class="blog-index" aria-label="Blog posts">
    <ul>
      {{ range .RegularPages.ByDate.Reverse }}
        <li>
          <a href="{{ .Permalink }}">{{ .Title }}</a>
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
          {{ with .Description }}<p>{{ . }}</p>{{ end }}
        </li>
      {{ end }}
    </ul>
  </nav>
  {{ end }}
</article>
{{ end }}
