{{ $machine := .Get 0 }}
{{ $subtitle := .Get 1 }}
{{ $apiBase := .Site.Params.hardwareApiBase | default "" }}
<div class="hardware-card" data-machine="{{ $machine }}" data-api-base="{{ $apiBase }}" aria-live="polite">
  <h3 class="hardware-card-title">{{ $machine }}</h3>
  {{ with $subtitle }}<p class="hardware-card-subtitle">{{ . }}</p>{{ end }}
  <div class="hardware-stats">
    <div class="hardware-stat" data-stat="cpu">
      <div class="hardware-stat-header">
        <span class="hardware-label">CPU<span class="hardware-temp" data-stat="temp"></span></span>
        <span class="hardware-value">—</span>
      </div>
      <div class="hardware-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="CPU usage">
        <div class="hardware-bar-fill"></div>
      </div>
    </div>
    <div class="hardware-stat" data-stat="memory">
      <div class="hardware-stat-header">
        <span class="hardware-label">RAM</span>
        <span class="hardware-value">—</span>
      </div>
      <div class="hardware-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Memory usage">
        <div class="hardware-bar-fill"></div>
      </div>
    </div>
    <div class="hardware-stat" data-stat="storage">
      <div class="hardware-stat-header">
        <span class="hardware-label">Storage</span>
        <span class="hardware-value">—</span>
      </div>
      <div class="hardware-bar hardware-bar-stacked" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Storage usage"></div>
    </div>
    <div class="hardware-stat hardware-network" data-stat="network">
      <div class="hardware-stat-header">
        <span class="hardware-label">Net</span>
        <span class="hardware-value hardware-net-values">
          <span class="hardware-net-rx" title="Receive">rx —</span>
          <span class="hardware-net-tx" title="Transmit">tx —</span>
        </span>
      </div>
    </div>
  </div>
</div>
